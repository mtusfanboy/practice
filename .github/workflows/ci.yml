# CI/CD пайплайн (DO-05).
#
# При пуше/PR в ветку main:
#   1. backend  — линтер (ruff) и юнит-тесты (pytest) с покрытием >= 50%.
#   2. frontend — проверка типов и сборка (vite build).
#   3. build    — при успехе линтеров и тестов на push в main собираются
#                 Docker-образы бэкенда и фронтенда.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      # Шрифт с кириллицей нужен для генерации тестовых PDF (QA-03).
      - name: Install Cyrillic fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=50

  frontend:
    name: Frontend · typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: knowledge-search-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: knowledge-search-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
