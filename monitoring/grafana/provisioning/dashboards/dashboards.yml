# Автоматическая загрузка дашбордов из каталога (DO-06).
apiVersion: 1

providers:
  - name: knowledge-search
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
