# Docker Compose для интеллектуальной поисковой системы (DO-03).
#
# Поднимает весь стек одной командой `docker compose up`:
#   - app           — бэкенд FastAPI
#   - front         — фронтенд (React, статика через Nginx)
#   - postgres      — хранилище метаданных
#   - elasticsearch — полнотекстовый поиск
#   - redis         — кеш поисковых запросов
#   - prometheus    — сбор метрик (DO-06)
#   - grafana       — визуализация метрик (DO-06)
#
# Все секреты передаются через переменные окружения (.env, DO-04).

name: knowledge-search

services:
  postgres:
    image: postgres:16-alpine
    container_name: ks-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ks-net]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ks-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks: [ks-net]

  redis:
    image: redis:7-alpine
    container_name: ks-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ks-net]

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ks-app
    environment:
      APP_NAME: ${APP_NAME:-University Knowledge Search}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-documents}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-20971520}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [ks-net]

  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ks-front
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - app
    networks: [ks-net]

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ks-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - app
    networks: [ks-net]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ks-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks: [ks-net]

volumes:
  postgres_data:
  es_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  ks-net:
    driver: bridge
